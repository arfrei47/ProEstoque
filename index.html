<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Control - Autenticação</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-bg">
    
    <div class="alert-banner blinking-alert" id="banner-contagem-index" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 550px; border-radius: 8px; text-align: center;">
        🗓️ Mapeando ciclo operacional semanal...
    </div>

    <div class="login-container">
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="font-size: 1.8rem; color: var(--dark);">WMS Control Panel</h1>
            <p style="color: var(--gray-text); font-size: 0.9rem;">Selecione seu perfil operacional</p>
        </div>
        <form id="form-auth">
            <div class="form-group">
                <label for="perfil-select">Perfil de Acesso</label>
                <select id="perfil-select" required>
                    <option value="" disabled selected>-- Escolha o Perfil --</option>
                    <option value="administrador">🔑 Administrador</option>
                    <option value="apontador">🎯 Apontador de Produção</option>
                    <option value="operacao">🔧 Operação</option>
                </select>
            </div>

            <div class="form-group" id="password-area" style="display: none;">
                <label for="input-senha">Senha Autenticadora</label>
                <input type="password" id="input-senha" placeholder="Digite a chave master">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar no Terminal</button>
        </form>
    </div>

    <script src="javascript/login.js"></script>
</body>
</html>
