<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acesso | Sistema de Suprimentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Bibliotecas necessárias para o instalador offline automático -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="login-body">

<div class="login-card">
    <header class="login-header">
        <h2>Industrial Supply v6</h2>
        <p>Selecione seu perfil operacional para ingressar no terminal</p>
    </header>

    <form id="form-autenticacao" novalidate>
        <div class="form-group">
            <label for="seletor-perfil">Perfil do Usuário</label>
            <select id="seletor-perfil" required>
                <option value="apontador" selected>🎯 Apontador (Padrão)</option>
                <option value="operador">🔧 Operador Logístico</option>
            </select>
        </div>

        <button type="submit" class="btn-submit btn-primary">Acessar Terminal de Controle</button>
    </form>

    <div class="login-divider"></div>

    <div class="backup-section">
        <p>Necessita operar em modo desconectado (Offline)?</p>
        <button type="button" id="btn-baixar-codigo" class="btn-clear-individual" style="border-style: solid; background: var(--gray-light);">
            💾 Baixar Sistema Completo (.ZIP)
        </button>
    </div>
</div>

<script>
    // Gerencia o fluxo de login local salvando o perfil em sessão antes do redirecionamento
    document.getElementById('form-autenticacao').addEventListener('submit', (e) => {
        e.preventDefault();
        const perfil = document.getElementById('seletor-perfil').value;
        sessionStorage.setItem('perfil_ativo', perfil);
        window.location.href = 'painel.html';
    });

    // Função Avançada: Compila o projeto e entrega um download limpo em ZIP para o cliente
    document.getElementById('btn-baixar-codigo').addEventListener('click', async () => {
        const btn = document.getElementById('btn-baixar-codigo');
        btn.textContent = "⌛ Compilando pacotes...";
        btn.disabled = true;

        try {
            const zip = new JSZip();
            
            // Mapeamento dos arquivos para download recursivo baseado na árvore local
            const caminhos = [
                'index.html', 'painel.html', 'css/style.css', 
                'javascript/LocalStorage/db.js', 'javascript/script.js'
            ];

            for (const path of caminhos) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        const texto = await response.text();
                        zip.file(path, texto);
                    }
                } catch (err) { console.error(`Falha ao empacotar arquivo local: ${path}`, err); }
            }

            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = "Sistema_Suprimentos_Enterprise.zip";
            link.click();
            
            btn.textContent = "✅ Download Concluído!";
        } catch (error) {
            alert("Erro ao gerar pacote local de instalação.");
            btn.textContent = "💾 Baixar Sistema Completo (.ZIP)";
        } finally {
            setTimeout(() => { btn.disabled = false; btn.textContent = "💾 Baixar Sistema Completo (.ZIP)"; }, 2500);
        }
    });
</script>
</body>
</html>
